[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile.api"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 30

[[services]]
name = "api"

[[crons]]
name = "pipeline"
schedule = "0 3 * * 2,4,6"
command = "python -m pipeline.runner"
